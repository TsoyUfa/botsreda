<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Среда Обучение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen" class="screen">
        <div class="loader">
            <div class="spinner"></div>
            <p>Загрузка курса...</p>
        </div>
    </div>

    <!-- Главный экран - Dashboard -->
    <div id="main-screen" class="screen" style="display: none;">
        <header class="app-header">
            <div class="user-info">
                <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
                <div>
                    <h2 id="user-name">Загрузка...</h2>
                    <p id="user-progress" class="progress-text">Пройдено 0 из 7 модулей</p>
                </div>
            </div>
        </header>

        <div class="progress-bar-container">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
            </div>
            <span id="progress-percent" class="progress-percent">0%</span>
        </div>

        <div class="modules-container">
            <h3>Модули обучения</h3>
            <div id="modules-list" class="modules-list">
                <!-- Модули будут загружены динамически -->
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-number" id="total-lessons">0</span>
                <span class="stat-label">Всего уроков</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completed-lessons">0</span>
                <span class="stat-label">Завершено</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="study-time">0ч</span>
                <span class="stat-label">Время обучения</span>
            </div>
        </div>
    </div>

    <!-- Экран модуля -->
    <div id="module-screen" class="screen" style="display: none;">
        <header class="module-header">
            <button class="back-btn" onclick="goBack()">
                <span>←</span>
            </button>
            <h2 id="module-title">Модуль</h2>
            <div class="module-progress">
                <span id="module-progress-text">0/0</span>
            </div>
        </header>

        <div id="lessons-list" class="lessons-list">
            <!-- Уроки модуля будут загружены динамически -->
        </div>
    </div>

    <!-- Экран урока -->
    <div id="lesson-screen" class="screen" style="display: none;">
        <header class="lesson-header">
            <button class="back-btn" onclick="goBackToModule()">
                <span>←</span>
            </button>
            <h2 id="lesson-title">Урок</h2>
            <button class="complete-btn" onclick="markLessonCompleted()">
                <span>✓</span>
            </button>
        </header>

        <div class="lesson-content">
            <!-- Видео контент -->
            <div id="video-container" class="video-container" style="display: none;">
                <iframe id="video-iframe" frameborder="0" allowfullscreen></iframe>
            </div>

            <!-- Текстовый контент -->
            <div id="text-content" class="text-content">
                <!-- Текст урока будет загружен динамически -->
            </div>

            <!-- Файлы для скачивания -->
            <div id="files-container" class="files-container" style="display: none;">
                <h4>Материалы урока</h4>
                <div id="files-list" class="files-list">
                    <!-- Файлы будут загружены динамически -->
                </div>
            </div>

            <!-- Задание/тест -->
            <div id="assignment-container" class="assignment-container">
                <h4>Домашнее задание</h4>
                <div id="assignment-content">
                    <!-- Задание будет загружено динамически -->
                </div>
                <button id="submit-assignment" class="btn btn-primary" onclick="submitAssignment()">
                    Сдать задание
                </button>
            </div>
        </div>
    </div>

    <!-- Экран профиля -->
    <div id="profile-screen" class="screen" style="display: none;">
        <header class="profile-header">
            <button class="back-btn" onclick="showMainScreen()">
                <span>←</span>
            </button>
            <h2>Мой профиль</h2>
        </header>

        <div class="profile-content">
            <div class="profile-stats">
                <h3>Ваша статистика</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span id="profile-modules-completed" class="stat-number">0</span>
                        <span class="stat-label">Модулей завершено</span>
                    </div>
                    <div class="stat-card">
                        <span id="profile-lessons-completed" class="stat-number">0</span>
                        <span class="stat-label">Уроков пройдено</span>
                    </div>
                    <div class="stat-card">
                        <span id="profile-study-hours" class="stat-number">0</span>
                        <span class="stat-label">Часов обучения</span>
                    </div>
                    <div class="stat-card">
                        <span id="profile-assignments-completed" class="stat-number">0</span>
                        <span class="stat-label">Заданий сдано</span>
                    </div>
                </div>
            </div>

            <div class="achievements">
                <h3>Достижения</h3>
                <div id="achievements-list" class="achievements-list">
                    <!-- Достижения будут загружены динамически -->
                </div>
            </div>
        </div>
    </div>

    <!-- Навигация внизу -->
    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showMainScreen()">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Учеба</span>
        </button>
        <button class="nav-btn" onclick="showProfile()">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профиль</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
