# Модули и уроки обучения
modules:
  1:
    title: "Блок 1. Роль Навигатора и Золотое Правило"
    description: "Основы работы Навигатора в недвижимости"
    estimated_time: "45 мин"
    video_platform: "youtube"  # youtube, vk, kinescope
    video_url: "https://youtu.be/EXAMPLE_VIDEO_ID_1"
    pdf_files:
      - name: "Чек-лист Навигатора"
        url: "https://docs.google.com/document/d/DOCUMENT_ID_1/export?format=pdf"
      - name: "Шаблон анализа клиента"
        url: "https://docs.google.com/spreadsheets/d/SPREADSHEET_ID_1/export?format=pdf"
    excel_files:
      - name: "Калькулятор комиссии"
        url: "https://docs.google.com/spreadsheets/d/SPREADSHEET_ID_2/export?format=xlsx"
    lessons:
      1:
        title: "Введение в роль Навигатора"
        duration: "15 мин"
        video_url: "https://youtu.be/LESSON_VIDEO_ID_1_1"
        text_content: |
          ## Что такое Навигатор?
          
          Навигатор — это не просто риелтор. Это эксперт, который проводит клиента через весь процесс сделки, обеспечивая прозрачность и безопасность.
          
          ### Ключевые отличия Навигатора от обычного агента:
          
          1. **Фокус на интересах клиента** — Навигатор всегда работает на стороне клиента
          2. **Экспертная оценка** — глубокое понимание рынка и застройщиков
          3. **Процессный подход** — четкий алгоритм работы на каждом этапе
          
          ### Почему клиенты выбирают Навигатора?
          
          - Экономия времени и нервов
          - Гарантия получения лучшего предложения
          - Защита от рисков и скрытых условий
        assignment:
          title: "Домашнее задание"
          description: "Просмотрите видео и подготовьте краткий конспект основных принципов работы Навигатора. Опишите 3 ситуации из вашей практики, где вы применили бы Золотое Правило."
          type: "text"
          
      2:
        title: "Золотое Правило взаимодействия"
        duration: "20 мин"
        text_content: |
          ## Золотое Правило
          
          **Не врать, не приукрашивать, не подлизываться**
          
          Это основа нашей методологии. Три простых правила, которые меняют всё в работе с клиентами.
          
          ### Не врать
          - Никаких ложных обещаний
          - Честная информация о всех рисках
          - Прозрачность в финансовых расчетах
          
          ### Не приукрашивать
          - Объективная оценка объектов
          - Реалистичные сроки
          - Работа с реальными возможностями клиента
          
          ### Не подлизываться
          - Профессиональная дистанция
          - Работа по фактам, а не на эмоциях
          - Уважение к интеллекту клиента
        assignment:
          title: "Практическое задание"
          description: "Проанализируйте 3 своих последних сделки. Где вы нарушали Золотое Правило? Как можно было поступить иначе?"
          type: "text"
          
      3:
        title: "Кейс: Первый контакт с клиентом"
        duration: "10 мин"
        video_url: "https://youtu.be/LESSON_VIDEO_ID_1_3"
        text_content: |
          ## Алгоритм первого контакта
          
          1. **Установление контакта** — 30 секунд
          2. **Краткая презентация** — 1 минута
          3. **Определение потребности** — 5 минут
          4. **Предложение следующего шага** — 30 секунд
          
          ### Пример диалога:
          
          **Навигатор:** "Добрый день! Я Навигатор по новостройкам. Помогаю клиентам находить лучшие предложения без переплат. Расскажите, что вы ищете?"
          
          **Клиент:** "Ищу двухкомнатную квартиру в пределах 5 млн"
          
          **Навигатор:** "Отлично! Учитывая ваш бюджет, могу предложить 2-3 хороших варианта с разными застройщиками. Давайте обсудим детали вашего поиска?"
        assignment:
          title: "Тренировка"
          description: "Напишите 5 вариантов начала диалога с клиентом. Запишите голосовое сообщение с разбором одного из вариантов."
          type: "voice"

  2:
    title: "Блок 2. JTBD-Диагностика и Боли Клиента"
    description: "Глубокое понимание реальных потребностей клиента"
    estimated_time: "60 мин"
    video_url: "https://youtu.be/EXAMPLE_VIDEO_ID_2"
    pdf_files:
      - name: "Опросник JTBD"
        url: "https://docs.google.com/document/d/DOCUMENT_ID_2/export?format=pdf"
      - name: "Карта болей клиента"
        url: "https://docs.google.com/document/d/DOCUMENT_ID_3/export?format=pdf"
    excel_files:
      - name: "Анализ болей рынка"
        url: "https://docs.google.com/spreadsheets/d/SPREADSHEET_ID_3/export?format=xlsx"
    lessons:
      1:
        title: "Что такое Jobs-to-be-Done?"
        duration: "15 мин"
        text_content: |
          ## Концепция Jobs-to-be-Done
          
          Клиенты не покупают продукты или услуги. Они нанимают их для выполнения определенной "работы" (Job).
          
          ### Примеры JTBD:
          
          **Неправильно:** "Клиент хочет купить квартиру"
          **Правильно:** "Клиенту нужно обеспечить безопасность семьи и дать детям хорошее образование"
          
          **Неправильно:** "Клиент ищет инвестицию"
          **Правильно:** "Клиенту нужно сохранить и приумножить капитал с минимальными рисками"
          
          ### Виды "работ":
          
          1. **Функциональная** - практическое применение
          2. **Эмоциональная** - чувства и переживания
          3. **Социальная** - восприятие окружающими
        assignment:
          title: "Анализ JTBD"
          description: "Возьмите 3 своих последних клиента и опишите их реальные 'работы'. Не просто 'купил квартиру', а что за этим стояло."
          type: "text"
          
      2:
        title: "Выявление болей клиента"
        duration: "25 мин"
        video_url: "https://youtu.be/LESSON_VIDEO_ID_2_2"
        text_content: |
          ## Техники выявления болей
          
          ### 1. Метод 5 почему
          
          **Клиент:** "Ищу квартиру побольше"
          **Почему?** "Мало места сейчас"
          **Почему?** "Дети растут, им тесно"
          **Почему?** "Хочу чтобы у них была своя комната"
          **Почему?** "Хорошее образование и развитие"
          **Почему?** "Хочу чтобы дети были успешнее меня"
          
          **Итог:** Реальная потребность - обеспечить успешное будущее детей
          
          ### 2. Властные вопросы
          
          - "Что самое важное для вас в этом решении?"
          - "От чего вы точно не откажитесь?"
          - "Что произойдет, если вы не решите эту задачу?"
          
          ### 3. Проекция в будущее
          
          "Представьте, что мы нашли идеальный вариант. Как изменится ваша жизнь через год?"
        assignment:
          title: "Практика выявления болей"
          description: "Проведите 3 интервью с потенциальными клиентами (даже если они не собираются покупать). Используйте техники выявления болей. Запишите диалоги и выделите реальные JTBD."
          type: "text"
          
      3:
        title: "Картирование болей"
        duration: "20 мин"
        text_content: |
          ## Создание карты болей
          
          Карта болей - это визуализация всех проблем, страхов и потребностей клиента.
          
          ### Структура карты:
          
          **1. Финансовые боли**
          - Страх переплаты
           Обесценивание вложений
          - Скрытые платежи
          - Проблемы с ипотекой
          
          **2. Эмоциональные боли**
          - Страх ошибки
          - Давление родственников
          - Неуверенность в будущем
          - Сравнение с другими
          
          **3. Практические боли**
          - Логистика
          - Время на поиск
          - Документы и бюрократия
          - Коммуникация с застройщиком
          
          ### Как использовать карту:
          
          1. Заполняем в процессе диалога
          2. Ищем корневые проблемы
          3. Предлагаем решения конкретных болей
          4. Показываем, как наш продукт решает именно их проблемы
        assignment:
          title: "Карта болей"
          description: "Создайте карту болей для одного из ваших клиентов. Покажите, как ваши предложения решают его конкретные проблемы."
          type: "file"

  3:
    title: "Блок 3. Финмоделирование и TCO за 5 лет"
    description: "Финансовая грамотность для агента"
    estimated_time: "90 мин"
    video_url: "https://youtu.be/EXAMPLE_VIDEO_ID_3"
    pdf_files:
      - name: "Формула TCO"
        url: "https://docs.google.com/document/d/DOCUMENT_ID_4/export?format=pdf"
      - name: "Гайд по ипотеке"
        url: "https://docs.google.com/document/d/DOCUMENT_ID_5/export?format=pdf"
    excel_files:
      - name: "Калькулятор TCO"
        url: "https://docs.google.com/spreadsheets/d/SPREADSHEET_ID_4/export?format=xlsx"
    lessons:
      1:
        title: "Что такое Total Cost of Ownership?"
        duration: "20 мин"
        text_content: |
          ## Total Cost of Ownership (TCO)
          
          TCO - это полная стоимость владения объектом недвижимости за определенный период (мы считаем на 5 лет).
          
          ### Из чего состоит TCO:
          
          **1. Первоначальные затраты:**
          - Стоимость квартиры
          - Регистрация права собственности
          - Нотариальные услуги
          - Комиссия банка (если ипотека)
          
          **2. Эксплуатационные расходы:**
          - Коммунальные платежи
          - Обслуживание дома
          - Ремонт (если новостройка)
          - Налог на имущество
          
          **3. Финансовые издержки:**
          - Проценты по ипотеке
          - Страховки
          - Инфляция
          
          **4. Возможные доходы/расходы:**
          - Аренда (если сдача)
          - Рост стоимости
          - Переезд (если необходимо)
          
          ### Почему это важно?
          
          Клиент смотрит только на стоимость квартиры. Навигатор показывает полную картину за 5 лет. Это меняет всё!
        assignment:
          title: "Расчет TCO"
          description: "Рассчитайте TCO для 3 разных объектов в одном ЖК. Сравните результаты. Какой вариант выгоднее на 5 лет и почему?"
          type: "file"
          
      2:
        title: "Скрытые расходы новостроек"
        duration: "30 мин"
        video_url: "https://youtu.be/LESSON_VIDEO_ID_3_2"
        text_content: |
          ## Скрытые расходы, о которых молчат застройщики
          
          ### 1. Доплата за ремонт
          
          **"Чистовая отделка"** за 25 000 руб/м² - это не всегда чистовая.
          
          Дополнительные расходы:
          - Доплата за розетки
          - Доплата за светильники
          - Доплата за сантехнику
          - Доплата за дверь
          
          **Реальная стоимость ремонта:** +30-50% к заявленной
          
          ### 2. Коммунальные платежи
          
          **Обещания:** 100 руб/м²
          **Реальность:** 200-250 руб/м²
          
          Почему:
          - Не учтены общие нужды
          - Не учтены лифты, консьерж
          - Не учтены коммерческие помещения
          
          ### 3. Паркинг
          
          **Обещания:** Машино-место 150 000 руб
          **Реальность:**
          - Нет свободных мест
          - Только подземный паркинг за 300 000
          - Дополнительные расходы на оформление
          
          ### 4. Аренда до заселения
          
          **Обещания:** Сдам через 6 месяцев
          **Реальность:** Сдам через 1.5 года
          
          Расходы на аренду за этот период:
          30 000 руб × 12 месяцев = 360 000 руб
        assignment:
          title: "Анализ скрытых расходов"
          description: "Возьмите 3 новостройки. Соберите полную информацию о реальных расходах. Сравните рекламные обещания с реальностью. Подготовьте отчет."
          type: "file"
          
      3:
        title: "Ипотечная стратегия"
        duration: "40 мин"
        text_content: |
          ## Ипотека - не просто кредит, а инструмент
          
          ### Виды ипотечных программ:
          
          **1. Государственная поддержка**
          - Семейная (на 2+ детей)
          - IT-ипотека
          - Дальневосточная
          - Сельская
          
          **Плюсы:** Низкая ставка
          **Минусы:** Много ограничений
          
          **2. Застройщик**
          - От 0,01% на 1-2 года
          - Требование о покупке отделки
          - Ограниченный срок предложения
          
          **3. Банк**
          - Стандартные программы
          - Надежность
          - Поддержка после сделки
          
          ### Стратегии использования ипотеки:
          
          **Стратегия 1: Минимальный взнос**
          - Взнос 15-20%
          - Максимальный срок (25-30 лет)
          - Цель: войти в квартиру с минимальными затратами
          
          **Стратегия 2: Быстрое погашение**
          - Взнос 30-50%
          - Срок 10-15 лет
          - Цель: минимальные переплаты
          
          **Стратегия 3: Инвестиционная**
          - Минимальный взнос 15%
          - Максимальный срок
          - Цель: максимальное использование рычага
          
          ### Как рассчитывать переплату?
          
          **Пример:**
          - Квартира: 5 000 000 руб
          - Взнос: 1 000 000 руб
          - Кредит: 4 000 000 руб
          - Ставка: 7%
          - Срок: 25 лет
          
          **Ежемесячный платеж:** 28 200 руб
          **Общая выплата:** 8 460 000 руб
          **Переплата:** 4 460 000 руб
          
          **Важно:** Переплата - это цена использования денег сейчас, а не через 25 лет
        assignment:
          title: "Ипотечный анализ"
          description: "Для одного клиента подготовьте 3 ипотечные стратегии. Рассчитайте переплату, ежемесячные платежи, риски. Какой вариант оптимальный и почему?"
          type: "file"

