<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B-Roll Punk Terminal: Лот 2 — ЖК Лесное Ожерелье</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #090a0f;
      --primary-color: #d1d5db;
      --accent-pink: #ff2e93;
      --accent-green: #00ff66;
      --muted-color: #4b5563;
      --font-mono: 'Share Tech Mono', 'Fira Code', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: #020205;
      font-family: var(--font-mono);
      color: var(--primary-color);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    /* 9:16 Vertical Viewport (1080x1920) */
    .viewport-9-16 {
      position: relative;
      width: 1080px;
      height: 1920px;
      background-color: var(--bg-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 120px 80px;
      border: 6px solid var(--muted-color);
      transform: scale(0.36);
      transform-origin: center center;
      box-shadow: 0 50px 150px rgba(0, 0, 0, 0.9);
      isolation: isolate;
    }

    /* CRT Scanlines */
    .viewport-9-16::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 10;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
    }

    .terminal-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 46, 147, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 46, 147, 0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      background-position: center center;
      z-index: -1;
    }

    /* --- ШАПКА --- */
    header {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .tag-row {
      font-size: 24px;
      color: var(--accent-pink);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 46, 147, 0.5);
    }

    .tag-row::before {
      content: ">> ";
    }

    .title-box {
      font-size: 64px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1.1;
      border-left: 10px solid var(--accent-pink);
      padding-left: 30px;
      text-transform: uppercase;
    }

    /* --- ЦЕНТРАЛЬНАЯ ЧАСТЬ (СПЛИT ЭКРАН 40/60) --- */
    .split-container {
      display: flex;
      flex-direction: column;
      gap: 50px;
      width: 100%;
      flex-grow: 1;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      animation: smooth-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes smooth-enter {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Левая панель: Лог Терминала */
    .left-panel {
      width: 100%;
      background: #0d0f17;
      border: 4px solid var(--muted-color);
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .panel-title {
      font-size: 20px;
      color: var(--accent-pink);
      text-transform: uppercase;
      border-bottom: 2px solid var(--muted-color);
      padding-bottom: 12px;
      letter-spacing: 0.1em;
    }

    .terminal-log {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .log-item {
      font-size: 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transform: translateX(-15px);
    }

    .item-0 { animation: show-log 0.4s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .item-1 { animation: show-log 0.4s 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .item-2 { animation: show-log 0.4s 1.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes show-log {
      to { opacity: 1; transform: translateX(0); }
    }

    .log-status {
      font-size: 16px;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--muted-color);
    }

    .status-selected { color: var(--accent-green); border-color: var(--accent-green); }
    .status-family { color: var(--primary-color); }
    .status-overpriced { color: var(--accent-pink); border-color: var(--accent-pink); }

    /* Правая панель: Калькулятор выгоды */
    .right-panel {
      width: 100%;
      background: #0d0f17;
      border: 4px solid var(--primary-color);
      box-shadow: 15px 15px 0px var(--accent-pink);
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .cashback-title {
      font-size: 24px;
      color: #ffffff;
      letter-spacing: 0.05em;
    }

    /* Шкала Прогресс-бара */
    .progress-bar-container {
      width: 100%;
      height: 40px;
      background: var(--bg-color);
      border: 3px solid var(--primary-color);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-pink), var(--accent-green));
      box-shadow: 0 0 15px var(--accent-green);
      animation: fill-progress 2.5s 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fill-progress {
      to { width: 100%; }
    }

    /* Эффект глитча в конце */
    .progress-fill::after {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0; width: 10px;
      background: #ffffff;
      animation: glitch-bar 0.3s 4.3s infinite steps(2);
    }

    @keyframes glitch-bar {
      50% { opacity: 0; }
    }

    /* Выгода блоки */
    .savings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      border-top: 2px dashed var(--muted-color);
      padding-top: 30px;
    }

    .savings-card {
      background: var(--bg-color);
      border: 1px solid var(--muted-color);
      padding: 20px;
      text-align: center;
    }

    .savings-card h6 {
      font-size: 15px;
      color: var(--muted-color);
      text-transform: uppercase;
    }

    .savings-val {
      font-size: 42px;
      font-weight: 800;
      margin-top: 5px;
    }

    .val-pink { color: var(--accent-pink); }
    .val-green { color: var(--accent-green); text-shadow: 0 0 15px var(--accent-green); }

    /* --- ПОДВАЛ (ФУТЕР) --- */
    footer {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 35px;
      align-items: center;
      border-top: 3px solid var(--muted-color);
      padding-top: 40px;
      text-align: center;
    }

    .footer-terminal {
      font-size: 20px;
      color: var(--muted-color);
      letter-spacing: 0.05em;
    }

    .footer-terminal span {
      color: var(--accent-green);
    }

    .control-btn {
      background: transparent;
      border: 3px solid var(--primary-color);
      color: var(--primary-color);
      padding: 16px 36px;
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 8px 8px 0px var(--muted-color);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.15s ease;
    }

    .control-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      box-shadow: 8px 8px 0px rgba(0, 242, 254, 0.3);
      transform: translate(-2px, -2px);
    }

    .control-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px transparent;
    }

    .control-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- Видео-контейнер 9:16 -->
  <div class="viewport-9-16" id="screen-capture-area">
    
    <div class="terminal-grid"></div>

    <!-- --- ШАПКА --- -->
    <header>
      <div class="tag-row">LOT_02 // INFO</div>
      <div class="title-box">ЖК Лесное Ожерелье</div>
    </header>

    <!-- --- ЦЕНТРАЛЬНАЯ ЧАСТЬ (СПЛИТ-ЭКРАН) --- -->
    <div class="split-container" id="main-split">
      
      <!-- Верхний сплит: Логи Терминала -->
      <div class="left-panel">
        <div class="panel-title">> TERMINAL_LOG</div>
        <div class="terminal-log">
          <div class="log-item item-0">
            <span>ЖК Лесное Ожерелье</span>
            <span class="log-status status-selected">SELECTED</span>
          </div>
          <div class="log-item item-1">
            <span>Тип: 3-комнатная квартира</span>
            <span class="log-status status-family">FAMILY_SIZE</span>
          </div>
          <div class="log-item item-2" style="color: var(--muted-color);">
            <span>Старая цена: 15.0 млн ₽</span>
            <span class="log-status status-overpriced">OVERPRICED</span>
          </div>
        </div>
      </div>

      <!-- Нижний сплит: Шкала выгоды -->
      <div class="right-panel">
        <div class="panel-title">> CASHBACK_CALCULATOR</div>
        
        <!-- Анимированная шкала прогресса -->
        <div class="progress-bar-container">
          <div class="progress-fill" id="p-bar"></div>
        </div>

        <div class="savings-row">
          <div class="savings-card">
            <h6>Дисконт</h6>
            <div class="savings-val val-pink">-20%</div>
          </div>
          <div class="savings-card">
            <h6>Сэкономили</h6>
            <div class="savings-val val-green">3 000 000 ₽</div>
          </div>
        </div>
      </div>

    </div>

    <!-- --- ПОДВАЛ --- -->
    <footer>
      <div class="footer-terminal">
        STATUS: <span>CALCULATION_COMPLETE</span> // PROGRESS_100%
      </div>

      <button class="control-btn" onclick="restartAnimation()">
        <svg viewBox="0 0 24 24">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm-6 8c0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v-3l4 4-4 4v-3c-3.31 0-6-2.69-6-6z"/>
        </svg>
        Запустить дубль
      </button>
    </footer>

  </div>

  <script>
    function restartAnimation() {
      // Перезапуск сплит-контейнера
      const split = document.getElementById('main-split');
      split.style.animation = 'none';
      split.offsetHeight;
      split.style.animation = 'smooth-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards';

      // Перезапуск строк логов
      const logs = document.querySelectorAll('.log-item');
      logs.forEach(l => {
        l.style.animation = 'none';
        l.offsetHeight;
      });
      logs[0].style.animation = 'show-log 0.4s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      logs[1].style.animation = 'show-log 0.4s 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      logs[2].style.animation = 'show-log 0.4s 1.7s cubic-bezier(0.16, 1, 0.3, 1) forwards';

      // Перезапуск шкалы прогресса
      const bar = document.getElementById('p-bar');
      bar.style.animation = 'none';
      bar.offsetHeight;
      bar.style.animation = 'fill-progress 2.5s 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards';
    }
  </script>
</body>
</html>
