<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: sans-serif;
            background-color: #222;
            color: white;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
        }
        .card h3 {
            margin-top: 10px;
            font-size: 14px;
        }
        .screenshot {
            max-width: 500px;
            margin-bottom: 40px;
            border: 2px solid #555;
            padding: 10px;
            background-color: #333;
            border-radius: 8px;
        }
        .screenshot img {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Screenshot from User</h1>
    <div class="screenshot">
        <img src="Смотреть недавние фото.png">
        <h3>Смотреть недавние фото.png</h3>
    </div>

    <h1>Carousel Images</h1>
    <div class="grid">
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-0.jpeg">
            <h3>0.jpeg (Slide 1)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-1.jpeg">
            <h3>1.jpeg (Slide 2)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-2.jpeg">
            <h3>2.jpeg (Slide 3)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-3.jpeg">
            <h3>3.jpeg (Slide 4)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-4.jpeg">
            <h3>4.jpeg (Slide 5)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-5.jpeg">
            <h3>5.jpeg (Slide 6)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-6.jpeg">
            <h3>6.jpeg (Slide 7)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-7.jpeg">
            <h3>7.jpeg (Slide 8)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-8.jpeg">
            <h3>8.jpeg (Slide 9)</h3>
        </div>
        <div class="card">
            <img src="Изображение JPEG-4F94-9A54-F2-9.jpeg">
            <h3>9.jpeg (Slide 10)</h3>
        </div>
    </div>
</body>
</html>
